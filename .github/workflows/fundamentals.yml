name: Weekly Fundamentals

on:
  schedule:
    # Every Sunday at 11:00 PM UTC (7:00 PM ET) — before Monday signal run
    - cron: "0 23 * * 0"

  # Run manually from the Actions tab anytime
  workflow_dispatch:

jobs:
  generate-fundamentals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Generate fundamentals
        run: python fundamentals_engine.py

      - name: Commit fundamentals.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fundamentals.json
          git diff --staged --quiet || git commit -m "Weekly fundamentals $(date -u '+%Y-%m-%d')"
          git pull --rebase origin main
          git push
