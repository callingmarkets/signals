name: Crypto Rotation Portfolio

on:
  schedule:
    - cron: '0 9 1 * *'   # 1st of every month at 9am UTC
  workflow_dispatch:

jobs:
  update-portfolio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests pandas numpy
      - name: Run Crypto Portfolio Backtest
        run: python crypto_portfolio.py
      - name: Commit portfolios.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolios.json
          git diff --cached --quiet || git commit -m "chore: update crypto portfolio [skip ci]"
          git push
