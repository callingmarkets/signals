name: Bitcoin Portfolio

on:
  workflow_run:
    workflows: ["Update Signals"]
    types: [completed]

  workflow_dispatch:

jobs:
  update-portfolio:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas numpy

      - name: Run portfolio engine
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python bitcoin_portfolio.py

      - name: Commit portfolios.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolios.json
          git diff --staged --quiet || git commit -m "Bitcoin portfolio update $(date -u '+%Y-%m-%d')"
          git push
