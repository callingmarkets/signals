name: Global Macro Portfolio

on:
  workflow_run:
    workflows: ["Semiconductor Portfolio"]   # Runs last in the weekly chain
    types: [completed]
  schedule:
    - cron: '0 8 1 * *'   # Also runs independently on 1st of month at 8am UTC
  workflow_dispatch:

jobs:
  update-portfolio:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas numpy

      - name: Run Global Macro Portfolio Engine
        env:
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: python macro_portfolio.py

      - name: Commit portfolios.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolios.json
          git diff --cached --quiet || git commit -m "chore: update macro portfolio [skip ci]"
          git push
