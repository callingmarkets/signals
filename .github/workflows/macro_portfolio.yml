name: Global Macro Portfolio

on:
  schedule:
    - cron: '0 8 1 * *'   # 1st of every month at 8am UTC
  workflow_dispatch:

jobs:
  update-portfolio:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas numpy

      - name: Run Global Macro Portfolio Engine
        env:
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: python macro_portfolio.py

      - name: Commit portfolios.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolios.json
          git diff --cached --quiet || git commit -m "chore: update macro portfolio [skip ci]"
          git push
