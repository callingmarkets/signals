name: Backfill Previous Signals

on:
  workflow_dispatch:  # Manual trigger only — run once then never again

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run backfill
        run: python backfill_previous.py

      - name: Commit updated signals.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals.json
          git diff --staged --quiet || git commit -m "Backfill previous signals"
          git push
