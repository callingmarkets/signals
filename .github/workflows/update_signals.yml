name: Update Signals

on:
  schedule:
    # Runs Monday–Friday at 9:00 PM UTC (5:00 PM ET / after market close)
    # To change the time, edit the cron value below.
    # Cron format: minute hour day month weekday
    - cron: "0 21 * * 1-5"

  # Allows you to run this manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  update-signals:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repo so the script can write signals.json to it
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install the two libraries the script needs
      - name: Install dependencies
        run: pip install requests pandas

      # 4. Run the signal engine
      #    API keys are loaded from GitHub Secrets (never visible in logs)
      - name: Run signal engine
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python signal_engine.py

      # 5. Commit and push the updated signals.json back to the repo
      - name: Commit signals.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals.json
          git diff --staged --quiet || git commit -m "Update signals $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
