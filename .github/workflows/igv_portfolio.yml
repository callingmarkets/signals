name: Tech Software Portfolio

on:
  workflow_run:
    workflows: ["Update Signals"]
    types: [completed]
  workflow_dispatch:

jobs:
  update-portfolio:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas numpy

      - name: Run Tech Software Portfolio Engine
        env:
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: python igv_portfolio.py

      - name: Commit portfolios.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolios.json
          git diff --cached --quiet || git commit -m "chore: update tech software portfolio [skip ci]"
          git push
